# =============================================================================
# Supervisor config — Production (manages Apache + Gunicorn in one container)
# =============================================================================
#
# Both processes log to stdout/stderr so CloudWatch Logs can capture them.
# The GUNICORN_WORKERS env var controls worker count (default 4).
# =============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:gunicorn]
command=gunicorn -c gunicorn_config.py wsgi:app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=prometheus_multiproc_dir="/dev/shm/puzzleboss_prometheus"
priority=20
