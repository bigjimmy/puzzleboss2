# =============================================================================
# Production Apache Config for Puzzleboss (ECS Fargate behind ALB)
# =============================================================================
#
# Architecture:
#   ALB (HTTPS termination, ACM cert) → Container port 80 (HTTP)
#
# The ALB handles SSL, so Apache only listens on port 80 (HTTP).
# OIDC authentication is handled by mod_auth_openidc.
# The API backend (Gunicorn) is proxied from Apache to localhost:5000.
# =============================================================================

<VirtualHost *:80>
    ServerName importanthuntpoll.org
    ServerAdmin benoc@alum.mit.edu
    DocumentRoot /canadia

    # Trust ALB X-Forwarded headers for real client IP
    RemoteIPHeader X-Forwarded-For
    # Tell mod_auth_openidc the original scheme/port (ALB terminates SSL)
    OIDCXForwardedHeaders X-Forwarded-Proto X-Forwarded-Port

    # Log real client IPs (not ALB IPs)
    LogFormat "%a %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined_realip
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined_realip

    # ──────────────────────────────────────────────────────────────
    # OIDC Authentication (Google Workspace)
    # ──────────────────────────────────────────────────────────────
    # Secrets are injected via environment variables at container start.
    # The entrypoint script generates /etc/apache2/oidc-secrets.conf from env vars.
    Include /etc/apache2/oidc-secrets.conf

    OIDCProviderMetadataURL https://accounts.google.com/.well-known/openid-configuration
    OIDCRedirectURI         https://importanthuntpoll.org/oauth2callback
    OIDCScope               "openid email profile"
    OIDCSessionInactivityTimeout 288000
    OIDCSessionType          server-cache:persistent
    OIDCCacheType            memcache
    OIDCMemCacheServers      "memcache.puzzleboss.local:11211"
    # Extract bare username from email (e.g., "benoc" from "benoc@domain.com")
    OIDCRemoteUserClaim     email "(.+)@.+" "$1"
    # Restrict login to team Google Workspace domain only
    OIDCAuthRequestParams   hd=importanthuntpoll.org&access_type=online&approval_prompt=auto

    # OIDC callback endpoint (mod_auth_openidc handles this automatically)
    <Location /oauth2callback>
        AuthType openid-connect
        Require valid-user
    </Location>

    # ──────────────────────────────────────────────────────────────
    # Public endpoints (no auth required)
    # ──────────────────────────────────────────────────────────────

    <Location "/robots.txt">
        Require all granted
        AuthType None
    </Location>

    <Location "/favicon.ico">
        Require all granted
        AuthType None
    </Location>

    # ALB health check — must be unauthenticated
    <Location "/health">
        Require all granted
        AuthType None
    </Location>
    Alias /health /var/www/html/health.html

    # ──────────────────────────────────────────────────────────────
    # Account / registration (has its own PHP session gate)
    # ──────────────────────────────────────────────────────────────
    Alias /account /app/account
    <Directory "/app/account">
        AllowOverride None
        Require all granted
        Options +ExecCGI
        DirectoryIndex index.php
        AuthType None
    </Directory>

    # ──────────────────────────────────────────────────────────────
    # Puzzleboss 2000 (main web UI)
    # ──────────────────────────────────────────────────────────────
    Alias /pb /app/www
    <Directory "/app/www">
        Options FollowSymLinks MultiViews
        AllowOverride None

        DirectoryIndex index.php index.html

        AuthType openid-connect
        Require valid-user
    </Directory>

    # Prometheus metrics endpoint (no auth — scraped by Prometheus)
    <Location ~ "metrics.php">
        Require all granted
        AuthType None
    </Location>

    # ──────────────────────────────────────────────────────────────
    # API proxy (Gunicorn on localhost:5000)
    # ──────────────────────────────────────────────────────────────
    ProxyPreserveHost On

    # Swagger API docs
    Redirect /apidocs /apidocs/
    ProxyPass "/apidocs/" "http://localhost:5000/apidocs/"
    ProxyPassReverse "/apidocs/" "http://localhost:5000/apidocs/"

    Redirect /flasgger_static /flasgger_static/
    ProxyPass "/flasgger_static/" "http://localhost:5000/flasgger_static/"
    ProxyPassReverse "/flasgger_static/" "http://localhost:5000/flasgger_static/"

    ProxyPass "/apispec_1.json" "http://localhost:5000/apispec_1.json"
    ProxyPassReverse "/apispec_1.json" "http://localhost:5000/apispec_1.json"

    # Swagger/API docs behind auth
    <Location /apidocs>
        AuthType openid-connect
        Require valid-user
    </Location>

    # ──────────────────────────────────────────────────────────────
    # Redirects
    # ──────────────────────────────────────────────────────────────
    RewriteEngine on
    Redirect /discordinvite  https://discord.gg/vhzHTsUDm6
    Redirect /discord https://discord.gg/vhzHTsUDm6
    Redirect /register /account

    # Root path is handled by ALB default target (mediawiki), not this container

    # ──────────────────────────────────────────────────────────────
    # Protect root filesystem
    # ──────────────────────────────────────────────────────────────
    <Directory "/">
        AllowOverride None
        Options FollowSymLinks
        Require all denied
    </Directory>

    <Directory "/canadia">
        AllowOverride All
        Options FollowSymLinks
        Require all denied
    </Directory>

</VirtualHost>
