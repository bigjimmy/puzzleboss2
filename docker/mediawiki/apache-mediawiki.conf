# =============================================================================
# Apache Config for MediaWiki (ECS Fargate behind ALB)
# =============================================================================
#
# Architecture:
#   ALB (HTTPS, /wiki* path rule) → Container port 80 (HTTP)
#
# The ALB terminates SSL and routes /wiki* to this container.
# Apache handles OIDC authentication, then MediaWiki uses Auth_remoteuser
# to trust the REMOTE_USER header.
# =============================================================================

<VirtualHost *:80>
    ServerName importanthuntpoll.org
    ServerAdmin benoc@alum.mit.edu

    # MediaWiki lives at /wiki — root redirects there
    DocumentRoot /var/www/html
    Alias /wiki /var/www/html

    RewriteEngine on

    # Trust ALB X-Forwarded headers for real client IP
    RemoteIPHeader X-Forwarded-For
    # Tell mod_auth_openidc the original scheme/port (ALB terminates SSL)
    OIDCXForwardedHeaders X-Forwarded-Proto X-Forwarded-Port

    # Logging to stdout/stderr for CloudWatch
    LogFormat "%a %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined_realip
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined_realip

    # ──────────────────────────────────────────────────────────────
    # OIDC Authentication (Google Workspace)
    # ──────────────────────────────────────────────────────────────
    # Secrets generated from environment variables by entrypoint script
    Include /etc/apache2/oidc-secrets.conf

    OIDCProviderMetadataURL https://accounts.google.com/.well-known/openid-configuration
    OIDCRedirectURI         https://importanthuntpoll.org/wiki/Special:OIDCCallback
    OIDCScope               "openid email profile"
    OIDCSessionInactivityTimeout 288000
    OIDCSessionType          server-cache:persistent
    OIDCCacheType            memcache
    OIDCMemCacheServers      "memcache.puzzleboss.local:11211"
    # Extract bare username from email (e.g., "benoc" from "benoc@domain.com")
    OIDCRemoteUserClaim     email "(.+)@.+" "$1"
    # Restrict login to team Google Workspace domain only
    OIDCAuthRequestParams   hd=importanthuntpoll.org&access_type=online&approval_prompt=auto

    # OIDC callback
    <Location /wiki/Special:OIDCCallback>
        AuthType openid-connect
        Require valid-user
    </Location>

    # ──────────────────────────────────────────────────────────────
    # Health check (unauthenticated for ALB)
    # ──────────────────────────────────────────────────────────────
    # Use SetEnvIf so the Directory block can exempt this path from OIDC
    SetEnvIf Request_URI "^/health$" HEALTH_CHECK

    <Location "/health">
        AuthType None
        Require all granted
    </Location>
    Alias /health /var/www/html/health.php

    # ──────────────────────────────────────────────────────────────
    # MediaWiki directory
    # ──────────────────────────────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks +MultiViews
        AllowOverride All

        # Bypass auth for health check endpoint (ALB health checker)
        <If "reqenv('HEALTH_CHECK') == '1'">
            AuthType None
            Require all granted
        </If>
        # Bypass auth for localhost (internal container health checks)
        <ElseIf "%{REMOTE_ADDR} == '127.0.0.1'">
            AuthType None
            Require all granted
            SetEnv REMOTE_USER bigjimmy
        </ElseIf>
        <Else>
            AuthType openid-connect
            Require valid-user
        </Else>
    </Directory>

    # Protect sensitive MediaWiki directories
    <Directory /var/www/html/config>
        Options -FollowSymLinks
        AllowOverride None
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    <Directory /var/www/html/images>
        Options -FollowSymLinks
        AllowOverride None
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    # ──────────────────────────────────────────────────────────────
    # /favicon.ico — short-circuit, do NOT route through MediaWiki.
    # ──────────────────────────────────────────────────────────────
    # Browsers auto-request /favicon.ico WITHOUT cookies (because
    # MediaWiki cookies are scoped to Path=/wiki and /favicon.ico
    # doesn't match). Without this short-circuit, the favicon request
    # falls through to /var/www/html/index.php (MediaWiki). MediaWiki
    # sees no session cookie, creates a new anonymous session, and
    # writes Set-Cookie: wikidb..._session=<new> in the response —
    # overwriting the user's existing session cookie in the browser.
    # When the user then submits an edit form, the wpEditToken (salted
    # with the OLD session's wsTokenSecrets) fails to validate against
    # the NEW session's secret, producing "Sorry! We could not process
    # your edit due to a loss of session data."
    #
    # MediaWiki 1.43→1.44 made session validation stricter and exposed
    # this latent bug.
    <Location "/favicon.ico">
        AuthType None
        Require all granted
    </Location>
    RedirectMatch 404 ^/favicon\.ico$

</VirtualHost>
