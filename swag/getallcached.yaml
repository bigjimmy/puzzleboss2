tags:
  - Puzzles
summary: Get all rounds and puzzles (cached)
description: |
  Returns all rounds with their puzzles, using Redis for performance.
  Falls back to direct database query if cache is unavailable or disabled.

  Deprecated alias for /all — both endpoints are identical.

  Each puzzle in the response includes a lastact field — the most recent
  activity for that puzzle, always current via the write-through Redis hash.
  Use this instead of calling /puzzles/<id>/lastact per puzzle to avoid N+1 queries.

  Configure caching via config values:
  - REDIS_ENABLED: 'true' or 'false'
  - REDIS_HOST: hostname of Redis server
  - REDIS_PORT: port (default 6379)
responses:
  200:
    description: All rounds with puzzles
    schema:
      type: object
      properties:
        rounds:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              puzzles:
                type: array
                description: |
                  Each puzzle object is identical to the /all response — see
                  getall.yaml for the full schema, including the per-puzzle
                  `lastact` object (always current via the write-through hash).
                items:
                  type: object

