tags:
  - Bot Stats
summary: Get all bot statistics
description: |
  Returns all bot statistics from the botstats table.

  Active cache counters (written by the /all path in pbrest and the
  write-through path in pbcachelib): cache_hits_total, cache_misses_total,
  cache_invalidations_total, cache_rebuild_lock_contentions_total,
  cache_write_through_failures_total, cache_cold_start_backfills_total.
  Other counters: tags_assigned_total, bigjimmy loop metrics, puzzcord
  member/activity metrics.

  All of the above are also exposed to Prometheus via metrics.php and surfaced
  on the redis-cache Grafana dashboard (alongside redis_exporter native
  metrics).
responses:
  200:
    description: Bot statistics retrieved successfully
    schema:
      type: object
      properties:
        status:
          type: string
          example: ok
        botstats:
          type: object
          description: Dictionary of bot statistics keyed by stat name
          additionalProperties:
            type: object
            properties:
              val:
                type: string
                description: The statistic value
              updated:
                type: string
                format: date-time
                description: When the stat was last updated
  500:
    description: Error fetching bot statistics

