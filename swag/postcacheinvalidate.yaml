Force cache invalidation
---
tags:
  - Cache
summary: Force invalidation of all caches
description: |
  Invalidates the /all Redis cache blob (key puzzleboss:all), forcing the next
  request to rebuild it from the database. Useful after bulk operations like
  hunt reset. Increments cache_invalidations_total.

  Only the /all blob is invalidated. The write-through lastact hash
  (puzzleboss:lastact) is always current and is not affected.
responses:
  200:
    description: Cache invalidated successfully
    schema:
      type: object
      properties:
        status:
          type: string
          example: ok
        message:
          type: string
          example: Cache invalidated successfully
  500:
    description: Error invalidating cache
    schema:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          description: Error message

