summary: Get all puzzles and rounds
description: |
  Get all puzzles organized by rounds with their complete information.
  Uses memcache for performance if available, falls back to database.
  
  Note: /all and /allcached are now equivalent endpoints.
tags:
  - Puzzles
  - Rounds
parameters: []
responses:
  200:
    description: List of all rounds with their puzzles
    schema:
      type: object
      properties:
        rounds:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                description: Round ID
              name:
                type: string
                description: Round name
              comments:
                type: string
                description: Round comments
              status:
                type: string
                enum: ['Solved']
                description: Status of the round (Solved when all meta puzzles are solved)
              puzzles:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: Puzzle ID
                    name:
                      type: string
                      description: Puzzle name
                    answer:
                      type: string
                      description: Puzzle answer if solved
                    puzzle_uri:
                      type: string
                      description: URI to the puzzle
                    chat_channel_id:
                      type: string
                      description: Discord channel ID
                    chat_channel_url:
                      type: string
                      description: Discord channel URL
                    sheet_id:
                      type: string
                      description: Google Sheet ID
                    current_solvers:
                      type: object
                      properties:
                        solvers:
                          type: array
                          items:
                            type: object
                            properties:
                              solver_id:
                                type: integer
                    solver_history:
                      type: object
                      properties:
                        solvers:
                          type: array
                          items:
                            type: object
                            properties:
                              solver_id:
                                type: integer
                    sheetcount:
                      type: integer
                      description: Number of sheets/tabs in the puzzle's Google spreadsheet
                    sheetenabled:
                      type: integer
                      description: Whether DeveloperMetadata tracking is enabled for the sheet (0 or 1)
                    status:
                      type: string
                      description: Puzzle status (New, Being worked, Solved, etc.)
                    roundname:
                      type: string
                      description: Name of the round this puzzle belongs to
                    round_id:
                      type: integer
                      description: ID of the round this puzzle belongs to
                    comments:
                      type: string
                      description: Comments about the puzzle
                    drive_uri:
                      type: string
                      description: Google Drive URI for the puzzle sheet
                    drive_id:
                      type: string
                      description: Google Drive ID for the puzzle sheet
                    chat_channel_name:
                      type: string
                      description: Discord channel name
                    chat_channel_link:
                      type: string
                      description: Discord channel link
                    ismeta:
                      type: integer
                      description: Whether this is a meta puzzle (0 or 1)
                    solvers:
                      type: string
                      description: Comma-separated list of all solver names who worked on this puzzle
                    cursolvers:
                      type: string
                      description: Comma-separated list of currently assigned solver names
                    xyzloc:
                      type: string
                      description: Physical location of puzzle (if applicable)
                    tags:
                      type: string
                      description: Comma-separated list of tag names
                    lastact:
                      type: string
                      format: date-time
                      description: Timestamp of most recent activity for this puzzle (ISO 8601 format)
  500:
    description: Error retrieving data
    schema:
      type: object
      properties:
        error:
          type: string
        error_type:
          type: string
        traceback:
          type: string
