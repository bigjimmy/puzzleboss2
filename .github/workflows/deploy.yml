name: Deploy

# Manually triggered deployment to ECS.
# Uses the image already in ECR (built by the Build workflow on last push).
# Trigger: GitHub UI → Actions → Deploy → Run workflow
# or: gh workflow run deploy.yml
#
# NOTE: This workflow is specific to the bigjimmy/puzzleboss2-infra AWS/ECS
# deployment. If you're deploying puzzleboss2 on different infrastructure,
# replace this file with whatever your deploy process looks like.

on:
  workflow_dispatch:
    inputs:
      wait:
        description: 'Wait for services to stabilize'
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 20

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Get infra repo token from SSM
        run: |
          INFRA_PAT=$(aws ssm get-parameter --region us-east-1 \
            --name /puzzleboss/utility/github_runner_pat \
            --query 'Parameter.Value' --output text)
          echo "INFRA_PAT=$INFRA_PAT" >> $GITHUB_ENV

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: bigjimmy/puzzleboss2-infra
          path: puzzleboss2-infra
          token: ${{ env.INFRA_PAT }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin \
            $(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-1.amazonaws.com

      - name: Deploy to ECS
        run: |
          ARGS="--skip-build"
          [ "${{ inputs.wait }}" = "true" ] && ARGS="$ARGS --wait"
          PUZZLEBOSS_DIR=$PWD puzzleboss2-infra/scripts/deploy.sh $ARGS
