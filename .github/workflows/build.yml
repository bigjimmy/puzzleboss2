name: Build

# Builds and pushes images to ECR on every push to master.
# Does NOT update ECS services — use the Deploy workflow for that.
#
# NOTE: This workflow is specific to the bigjimmy/puzzleboss2-infra AWS/ECS
# deployment. If you're deploying puzzleboss2 on different infrastructure,
# replace this file with whatever your build/push process looks like.
#
# Runs on the utility server self-hosted runner (ARM64/Graviton) for
# native builds. AWS credentials come from the EC2 instance profile —
# no secrets needed in GitHub. The PAT for checking out puzzleboss2-infra
# (private repo) is fetched from SSM using the instance profile.
#
# Build behaviour:
#   - puzzleboss image: built on every push to master
#   - mediawiki image:  built only when Dockerfile.mediawiki or docker/mediawiki/** changes

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 30
    if: github.repository == 'bigjimmy/puzzleboss2'

    steps:
      - name: Checkout app repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2  # needed for git diff HEAD^ HEAD

      - name: Check if mediawiki files changed
        id: mw-changed
        run: |
          if git diff --name-only HEAD^ HEAD 2>/dev/null | grep -qE '^(Dockerfile\.mediawiki|docker/mediawiki/)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Get infra repo token from SSM
        id: get-pat
        run: |
          INFRA_PAT=$(aws ssm get-parameter --region us-east-1 \
            --name /puzzleboss/utility/github_runner_pat \
            --query 'Parameter.Value' --output text)
          echo "::add-mask::$INFRA_PAT"
          echo "infra_pat=$INFRA_PAT" >> $GITHUB_OUTPUT

      - name: Checkout infra repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: bigjimmy/puzzleboss2-infra
          path: puzzleboss2-infra
          token: ${{ steps.get-pat.outputs.infra_pat }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin \
            $(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push puzzleboss
        run: PUZZLEBOSS_DIR=$PWD puzzleboss2-infra/scripts/deploy.sh --service puzzleboss --build-only

      - name: Build and push mediawiki
        if: steps.mw-changed.outputs.changed == 'true'
        run: PUZZLEBOSS_DIR=$PWD puzzleboss2-infra/scripts/deploy.sh --service mediawiki --build-only
